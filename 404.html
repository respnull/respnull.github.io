<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Oops!</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-image: url('https://respnull.github.io/assets/128.png');
        background-repeat: repeat;
        color: #fff;
    }

    nav {
        display: flex;
        justify-content: center;
        background-color: rgba(0, 0, 0, 0.75);
        padding: 1rem 0;
        position: sticky;
        top: 0;
    }

    nav a {
        color: #00ff00;
        text-decoration: none;
        margin: 0 1.5rem;
        font-weight: bold;
    }

    nav a:hover {
        text-decoration: underline;
    }

    .container {
        position: relative;
        max-width: 700px;
        margin: 4rem auto;
        padding: 2rem;
        background-color: rgba(0,0,0,0.75);
        border-radius: 12px;
        text-align: center;
    }

    .cimg {
        position: absolute;
        bottom: 0;
        right: 0;
        width: 30%;
        max-width: 200px;
        height: auto;
    }

    h1 {
        font-size: 4rem;
        margin-bottom: 0.5rem;
        color: #00ff00;
    }

    p {
        margin: 0.5rem 0;
    }

    footer {
        text-align: center;
        margin-top: 3rem;
        font-size: 0.9rem;
        color: #ccc;
    }
</style>
</head>

<body>
    <nav>
        <a href="/">Home</a>
    </nav>

    <div class="container">
        <h1>404</h1>
        <p>We searched our system, but didn't find anything :(</p>
        <img src="https://respnull.github.io/assets/respling404.png" class="cimg">
    </div>

    <footer>© 2026 respnull</footer>
</body>
</html>
